# infra/nginx.conf

server {
    # Nginx escucha en el puerto 80 (HTTP estándar)
    listen 80;
    server_name localhost; # En producción aquí iría tu dominio, ej: andinatech.com

    # 1. Servir archivos estáticos directamente (Descarga a Gunicorn de este trabajo)
    location /static/ {
        # Cambia esta ruta por la ruta absoluta donde esté tu proyecto en el servidor
        alias /ruta/absoluta/a/tu/proyecto/andina-tech/static/;
        # Añadir caché para mejorar rendimiento
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 2. Proxy Inverso hacia Gunicorn (Aplicación Python)
    location / {
        proxy_pass http://127.0.0.1:8000; # Puerto donde correrá Gunicorn
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Manejo de Errores Personalizados (Requisito G2)
    error_page 404 /404.html;
    location = /404.html {
        root /ruta/absoluta/a/tu/proyecto/andina-tech/templates/;
        internal;
    }

    error_page 500 502 503 504 /500.html;
    location = /500.html {
        root /ruta/absoluta/a/tu/proyecto/andina-tech/templates/;
        internal;
    }
}